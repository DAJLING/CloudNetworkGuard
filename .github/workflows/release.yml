name: Release Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm run make-icon

      - name: Test
        run: pnpm test

      - name: Build macOS installers
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --mac --x64 --arm64

      - name: Build Windows installers
        if: runner.os == 'Windows'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm run dist:win
          pnpm run dist:win:msi

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.pkg
            dist/*.exe
            dist/*.msi
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
